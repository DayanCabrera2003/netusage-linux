# Configuracion de cargo del workspace.
#
# Enlace estatico para el target musl: produce un binario sin dependencia de la
# glibc del sistema, portable entre distribuciones. `+crt-static` ya es el
# comportamiento por defecto de musl, pero se fija de forma explicita para que
# el contrato de "binario estatico" no dependa de defaults del toolchain.
[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]
